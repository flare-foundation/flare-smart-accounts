stages:
  - build
  - test
  - sbom

# Prevent duplicate pipelines (MR and BRANCH pipelines, when a MR is opened for the given branch)
workflow:
  rules:
  - if: '$CI_OPEN_MERGE_REQUESTS != null && ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "webide")'
    when: never
  - when: always

default:
  tags:
    - flarenetwork
  artifacts:
    expire_in: 3 days

##
## PARTIALS
##

.partials:
  cache-nodejs:
    key:
      files: [ pnpm-lock.yaml ]
    paths:
    - node_modules/
    policy: pull


##
## SCANNERS
##


include:
- component: gitlab.com/flarenetwork/ci-components-private/lgtm@2
- component: gitlab.com/flarenetwork/ci-components-private/dependency-track@2
- component: gitlab.com/flarenetwork/ci-components-private/lint-shell@2
- component: gitlab.com/flarenetwork/ci-components-private/lint-dockerfile@2
- template: Jobs/SAST.latest.gitlab-ci.yml
- template: Jobs/Secret-Detection.latest.gitlab-ci.yml


sast:
  needs: []

.secret-analyzer:
  needs: []


##
##  BUILD
##
build-node-modules:
  stage: build
  needs: []
  image: node:24
  timeout: 10 minutes
  script:
  - corepack enable pnpm
  - pnpm install --frozen-lockfile
  - pnpm exec tsx --eval 'const value = 1 as number; if (value !== 1) process.exit(1)'
  cache:
  - key:
      files: [ pnpm-lock.yaml ]
    paths:
    - node_modules/
    policy: pull-push


##
## LINTERS
##

lint-test:
  image: node:24
  stage: test
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm lint-sol-test

lint-contracts:
  image: node:24
  stage: test
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm lint-sol-contracts

lint-deployment:
  image: node:24
  stage: test
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm lint-sol-deployment

lint-ts:
  image: node:24
  stage: test
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm lint:check

typecheck:
  image: node:24
  stage: test
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm typecheck

format-check:
  image: node:24
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  script:
  - corepack enable pnpm
  - pnpm format:check

slither:
  image: flarefoundation/foundry-custom:latest
  stage: test
  tags: [ flarenetwork-md ]
  timeout: 10 minutes
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  before_script:
  - apt-get update 1>/dev/null && apt-get install -y python3-pip 1>/dev/null
  - pip3 install slither-analyzer --break-system-packages 1>/dev/null
  - forge soldeer install
  - forge install --no-git
  - forge build
  script:
  - rm -f ./slither.json
  - slither . --filter-paths "dependencies|node_modules|mock" --json=./slither.json 2>/dev/null || true
  - node scripts/slither-parse.js ./slither.json

##
##  TESTS
##
test:
  timeout: 10 minutes
  stage: test
  tags: [ flarenetwork-md ]
  image: flarefoundation/foundry-custom:latest
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  before_script:
  - corepack enable pnpm
  - pnpm install --frozen-lockfile
  - forge soldeer install
  - forge install --no-git
  - forge build
  script:
  - forge test -vvv

##
## COVERAGE
##

coverage:
  image: flarefoundation/foundry-custom:latest
  stage: test
  tags: [ flarenetwork-md ]
  timeout: 10 minutes
  needs:
  - job: build-node-modules
    artifacts: false
  cache: [ !reference [.partials, cache-nodejs] ]
  before_script:
  - corepack enable pnpm
  - pnpm install --frozen-lockfile
  - forge soldeer install
  - forge install --no-git
  - forge build
  script:
  - forge coverage --report summary --report lcov --no-match-test 'testProxyCreationCode(LengthMatchesFreshCompilation|MatchesFreshCompilationModuloMetadata)'
  artifacts:
    expire_in: 30 days
    paths:
    - lcov.info

coverage-reports:
  image: node:24-alpine
  stage: test
  timeout: 4 minutes
  needs:
  - job: coverage
    artifacts: true
  before_script:
  - echo "https://dl-cdn.alpinelinux.org/alpine/edge/testing" >> /etc/apk/repositories
  - echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
  - echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories
  - apk add --no-cache python3 py3-pip lcov 1>/dev/null
  - apk upgrade --no-cache 1>/dev/null
  - pip3 install --break-system-packages lcov_cobertura 1>/dev/null
  script:
  - node scripts/forge-lcov-prune.js
  - genhtml lcov.info.pruned --branch-coverage --output-dir coverage --ignore-errors inconsistent
  - lcov_cobertura lcov.info.pruned --output coverage-cobertura.xml
  - lcov --summary lcov.info.pruned --rc branch_coverage=1 --ignore-errors inconsistent
  coverage: '/  lines[\ .:]+\d+\.\d+%/' # https://regex101.com/r/KVj9Dr/1
  artifacts:
    expire_in: 30 days
    paths:
    - lcov.info.pruned
    - coverage
    - coverage-cobertura.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-cobertura.xml
